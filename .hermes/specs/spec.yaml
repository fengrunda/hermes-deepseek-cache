# Personal AI Coding OS — hermes-deepseek-cache Spec
# 执行期只读；变更需用户批准并 commit
# 来源: hermes-agent/docs/plans/2026-06-30-deepseek-cache-hermes-reasonix.md §6

version: "1"
project: hermes-deepseek-cache
description: "DeepSeek prefix-cache wire shaping plugin (Reasonix-style reasoning echo suppression + cache observability). Installs at ~/.hermes/plugins/hermes-deepseek-cache/."

modules:
  manifest:
    responsibility: "plugin.yaml — Hermes plugin manifest declaring hooks and metadata"
    paths:
      - "plugin.yaml"
    forbidden: []

  registration:
    responsibility: "__init__.py — register(ctx) wiring middleware + hooks + optional CLI command"
    paths:
      - "__init__.py"
    forbidden: []

  wire:
    responsibility: "wire.py — DeepSeek detection, reasoning_content strip on non-tool-calls assistant turns"
    paths:
      - "wire.py"
    forbidden:
      - usage
      - stats
      - cli

  usage:
    responsibility: "usage.py — prompt_cache_hit_tokens / prompt_cache_miss_tokens parsing and per-session accumulation"
    paths:
      - "usage.py"
    forbidden:
      - wire
      - middleware

  tests:
    responsibility: "tests/ — unit tests for wire and usage, no live API calls"
    paths:
      - "tests/**"
    forbidden: []

  docs:
    responsibility: "README.md — install, usage, limitations, LCM coexistence notes"
    paths:
      - "README.md"
    forbidden: []

rules:
  - id: no-core-modification
    text: "插件不得修改 Hermes core 文件 (run_agent.py, agent/, cli.py, gateway/, etc.)"
  - id: no-context-engine-slot
    text: "必须使用 llm_request middleware 槽位，不得使用 context_engine 槽位"
  - id: no-cache-control-injection
    text: "不得给 DeepSeek 注入 cache_control（上游忽略）"
  - id: reasonix-wire-discipline
    text: "仅在 assistant 有 tool_calls 时保留 reasoning_content；纯文本 assistant 轮删除 reasoning_content"
  - id: no-patch-fixes
    text: "违规必须重写，禁止叠加 patch"
  - id: minimal-diff
    text: "只改完成任务所需的最小文件集合"
  - id: no-over-engineering
    text: "禁止无需求的抽象层、配置项、或 premature generalization"

dependencies:
  manifest: []
  registration: [manifest]
  wire: []
  usage: []
  tests: [wire, usage]
  docs: []

invariants:
  - "tool_calls 轮必须保留 reasoning_content（否则 API 400）"
  - "DeepSeek 检测必须覆盖 provider=='deepseek' / 模型名含 deepseek / base_url 主机为 api.deepseek.com"
  - "middleware 不得修改 session DB 中的持久化 reasoning 字段；只改 outgoing wire copy"
  - "post_api_request hook 累计 stats 写入 ~/.hermes/plugins/hermes-deepseek-cache/stats.json"
  - "auxiliary_client 侧 LLM 调用不经过 apply_llm_request_middleware，不在插件覆盖范围"

token_budget:
  max_subtasks: 4
  max_files_per_task: 3
  max_loc_delta: 300

enforcement:
  max_coder_retries: 2
  max_compressor_retries: 1
  blocked_globs:
    - "**/node_modules/**"
    - "**/.env*"
    - "**/run_agent.py"
    - "**/agent/**"
    - "**/cli.py"
    - "**/gateway/**"
